services:
  db:
    image: pgvector/pgvector:pg16
    container_name: sparcos-rag-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sparcos
      POSTGRES_PASSWORD: sparcos
      POSTGRES_DB: sparcos_rag
    ports: ["5433:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
volumes:
  pgdata: {}
